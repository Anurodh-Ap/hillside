version: '3.9'

services:

  # ── Backend API (Node.js + SQLite) ──
  backend:
    build: ./backend
    container_name: hillside-backend
    ports:
      - "3563:4267"
    environment:
      - PORT=3563
      - NODE_ENV=production
    volumes:
      - sqlite_data:/app/data     # ← persists the SQLite .db file
    restart: unless-stopped

  # ── Frontend (nginx) ──
  frontend:
    build: ./frontend
    container_name: hillside-frontend
    ports:
      - "3645:6525"
    depends_on:
      - backend
    restart: unless-stopped

# Named volume — SQLite DB survives container restarts
volumes:
  sqlite_data:
